remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: dark

title: "Mímis Gildi"
subtitle: "Community"
description: "Organization-wide defaults, community health, and contributor guidance for Mímis Gildi."
url: "https://mimis-gildi.github.io"
baseurl: "/.github"
repository: "Mimis-Gildi/.github"

locale: "en-US"
encoding: "utf-8"

search: true
search_full_content: true
search_provider: lunr
lunr:
  search_within_pages: true

plugins:
  - jekyll-asciidoc
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

author:
  name: "Mimis Gildi"
  bio: "The tree grows."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Mimis-Gildi"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Mimis-Gildi"

sass:
  quiet_deps: true

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - CLAUDE.md
  - "*.swp"
  - ".jekyll-cache"
